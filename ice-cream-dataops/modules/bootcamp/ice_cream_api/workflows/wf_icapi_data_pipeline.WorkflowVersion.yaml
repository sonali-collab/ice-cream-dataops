externalId: wf_icapi_data_pipeline
version: '1'
workflowExternalId: wf_icapi_data_pipeline
workflowDefinition:
  tasks:
    - externalId: icapi_datapoints_extractor_task
      type: function
      parameters:
        function:
          externalId: icapi_datapoints_extractor
          data:
            hours: 1
      retries: 3
      timeout: 3600
      onFailure: abortWorkflow
    - externalId: contextualize_ts_assets_task
      type: transformation
      parameters:
        transformation:
          externalId: contextualize_ts_assets
      retries: 3
      timeout: 3600
      dependsOn:
        - externalId: icapi_datapoints_extractor_task
    - externalId: create_asset_hierarchy_task
      type: transformation
      parameters:
        transformation:
          externalId: create_asset_hierarchy
      retries: 3
      timeout: 3600
      dependsOn:
        - externalId: contextualize_ts_assets_task
    - externalId: oee_timeseries_task
      type: function
      parameters:
        function:
          externalId: oee_timeseries
          data:
            hours: 1
      retries: 3
      timeout: 3600
      dependsOn:
        - externalId: create_asset_hierarchy_task
 